# ============================================================================
# AeroSpace window manager configuration
# ============================================================================
# tiling window manager for macOS. manages workspaces across monitors and
# handles automatic app placement, keybindings, and layout rules.
#
# workspaces are purpose-driven: numbered (1-6) for general use, named for
# fixed contexts (C: communication, M: media, N: notes, X: mail).
# all keybindings use ctrl+alt+cmd as the base modifier, mapped to a single
# Hyper key via Karabiner.
#
# SKETCHYBAR INTEGRATION
# the menubar reflects workspace state in real time. switching workspaces,
# moving windows, and opening or closing apps all notify sketchybar to
# redraw the affected workspace indicators automatically.
# ============================================================================

# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# You can use it to add commands that run after login to macOS user session.
# 'start-at-login' needs to be 'true' for 'after-login-command' to work
# Available commands: https://nikitabobko.github.io/AeroSpace/commands
after-login-command = []

# You can use it to add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = ['exec-and-forget sketchybar']
# Run Sketchybar together with AeroSpace
# sketchbar has a built-in detection of already running process,
# so it won't be run twice on AeroSpace restart

# Notify Sketchybar about workspace change
exec-on-workspace-change = [
    '/bin/bash',
    '-c',
    'sketchybar --trigger aerospace_workspace_change AEROSPACE_WORKSPACES="$AEROSPACE_PREV_WORKSPACE $AEROSPACE_FOCUSED_WORKSPACE"',
]

# Start AeroSpace at login
start-at-login = true

# Opt in to config-version 2 behavior. See:
# https://nikitabobko.github.io/AeroSpace/guide#config-version
config-version = 2

# Automatically reload the config on file change (no manual reload needed)
auto-reload-config = true

# In config-version 2, persistent workspaces are no longer inferred from
# keybindings — they must be declared explicitly. This list mirrors the
# workspace bindings below and is the enumeration source sketchybar uses to
# create its workspace items (see .config/sketchybar/items/aerospace.sh).
persistent-workspaces = ['1', '2', '3', '4', '5', '6', 'C', 'M', 'N', 'X']

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
# on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
# or
# Mouse lazily follows any focus (window or workspace)
on-focus-changed = [
  'move-mouse window-lazy-center',
  "exec-and-forget /bin/bash -c 'sketchybar --trigger aerospace_workspace_change AEROSPACE_WORKSPACES=$(aerospace list-workspaces --focused)'",
]

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# Possible values: (qwerty|dvorak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See: https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.left = 8
outer.bottom = 8
outer.top = [{ monitor.built-in = 8 }, 40]
outer.right = 8

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon, backtick,
#                   leftSquareBracket, rightSquareBracket, space, enter, esc, backspace, tab
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift

# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

# See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
# You can uncomment the following lines to open up terminal with alt + enter shortcut (like in i3)
# alt-enter = '''exec-and-forget osascript -e '
# tell application "Terminal"
#     do script
#     activate
# end tell'
# '''

# See: https://nikitabobko.github.io/AeroSpace/commands#layout
ctrl-alt-cmd-slash = 'layout tiles horizontal vertical'
ctrl-alt-cmd-comma = 'layout accordion horizontal vertical'

# See: https://nikitabobko.github.io/AeroSpace/commands#focus
ctrl-alt-cmd-h = 'focus left'
ctrl-alt-cmd-j = 'focus down'
ctrl-alt-cmd-k = 'focus up'
ctrl-alt-cmd-l = 'focus right'

# See: https://nikitabobko.github.io/AeroSpace/commands#move
ctrl-alt-cmd-shift-h = 'move left'
ctrl-alt-cmd-shift-j = 'move down'
ctrl-alt-cmd-shift-k = 'move up'
ctrl-alt-cmd-shift-l = 'move right'

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
ctrl-alt-cmd-shift-minus = 'resize smart -50'
ctrl-alt-cmd-shift-equal = 'resize smart +50'

ctrl-alt-cmd-f = ['fullscreen', 'mode main']

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace
ctrl-alt-cmd-1 = 'workspace 1'
ctrl-alt-cmd-2 = 'workspace 2'
ctrl-alt-cmd-3 = 'workspace 3'
ctrl-alt-cmd-4 = 'workspace 4'
ctrl-alt-cmd-5 = 'workspace 5'
ctrl-alt-cmd-6 = 'workspace 6'
# ctrl-alt-cmd-7 = 'workspace 7'
# ctrl-alt-cmd-8 = 'workspace 8'
# ctrl-alt-cmd-9 = 'workspace 9'
# ctrl-alt-cmd-a = 'workspace A' # In your config, you can drop workspace bindings that you don't need
# ctrl-alt-cmd-b = 'workspace B'
ctrl-alt-cmd-c = 'workspace C' # communication
# ctrl-alt-cmd-d = 'workspace D'
# ctrl-alt-cmd-e = 'workspace E'
# ctrl-alt-cmd-f = 'workspace F'
# ctrl-alt-cmd-g = 'workspace G'
# ctrl-alt-cmd-i = 'workspace I'
ctrl-alt-cmd-m = 'workspace M' # media (music, video, etc.)
ctrl-alt-cmd-n = 'workspace N' # notes
# ctrl-alt-cmd-o = 'workspace O'
# ctrl-alt-cmd-p = 'workspace P'
# ctrl-alt-cmd-q = 'workspace Q'
# ctrl-alt-cmd-r = 'workspace R'
# ctrl-alt-cmd-s = 'workspace S'
# ctrl-alt-cmd-t = 'workspace T'
# ctrl-alt-cmd-u = 'workspace U'
# ctrl-alt-cmd-v = 'workspace V'
# ctrl-alt-cmd-w = 'workspace W'
ctrl-alt-cmd-x = 'workspace X' # mail
# ctrl-alt-cmd-y = 'workspace Y'
# ctrl-alt-cmd-z = 'workspace Z'

# See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
ctrl-alt-cmd-shift-1 = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh 1'
ctrl-alt-cmd-shift-2 = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh 2'
ctrl-alt-cmd-shift-3 = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh 3'
ctrl-alt-cmd-shift-4 = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh 4'
ctrl-alt-cmd-shift-5 = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh 5'
ctrl-alt-cmd-shift-6 = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh 6'
# ctrl-alt-cmd-shift-7 = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh 7'
# ctrl-alt-cmd-shift-8 = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh 8'
# ctrl-alt-cmd-shift-9 = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh 9'
# ctrl-alt-cmd-shift-a = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh A'
# ctrl-alt-cmd-shift-b = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh B'
ctrl-alt-cmd-shift-c = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh C'
# ctrl-alt-cmd-shift-d = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh D'
# ctrl-alt-cmd-shift-e = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh E'
# ctrl-alt-cmd-shift-f = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh F'
# ctrl-alt-cmd-shift-g = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh G'
# ctrl-alt-cmd-shift-i = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh I'
ctrl-alt-cmd-shift-m = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh M'
ctrl-alt-cmd-shift-n = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh N'
# ctrl-alt-cmd-shift-o = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh O'
# ctrl-alt-cmd-shift-p = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh P'
# ctrl-alt-cmd-shift-q = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh Q'
# ctrl-alt-cmd-shift-r = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh R'
# ctrl-alt-cmd-shift-s = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh S'
# ctrl-alt-cmd-shift-t = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh T'
# ctrl-alt-cmd-shift-u = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh U'
# ctrl-alt-cmd-shift-v = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh V'
# ctrl-alt-cmd-shift-w = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh W'
ctrl-alt-cmd-shift-x = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh X'
# ctrl-alt-cmd-shift-y = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh Y'
# ctrl-alt-cmd-shift-z = 'exec-and-forget ~/.config/aerospace/move-and-notify.sh Z'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
ctrl-alt-cmd-tab = 'workspace-back-and-forth'
# See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
ctrl-alt-cmd-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# See: https://nikitabobko.github.io/AeroSpace/commands#mode
ctrl-alt-cmd-shift-semicolon = 'mode service'

# Open Apps
ctrl-alt-cmd-w = '''exec-and-forget osascript -e '
tell application "Safari"
    make new document at end of documents
    activate
end tell'
'''

# https://www.reddit.com/r/macapps/comments/191gh1x/comment/kh0glgm/
ctrl-alt-cmd-e = '''exec-and-forget osascript -e 'tell application "Finder"
    set targetFolder to (path to home folder as text) & "Spawn"
    make new Finder window to folder targetFolder
    do shell script "open -a Finder"
end tell'
'''

ctrl-alt-cmd-t = '''exec-and-forget osascript -e '
tell application "Ghostty"
    activate
    tell application "System Events" to keystroke "n" using {command down}
end tell'
'''

ctrl-alt-cmd-v = 'exec-and-forget open raycast://extensions/raycast/clipboard-history/clipboard-history'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
esc = ['reload-config', 'exec-and-forget sketchybar --reload', 'mode main']
r = ['flatten-workspace-tree', 'mode main'] # reset layout
f = [
    'layout floating tiling',
    'mode main',
] # Toggle between floating and tiling layout
backspace = ['close-all-windows-but-current', 'mode main']

# sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
#s = ['layout sticky tiling', 'mode main']

ctrl-alt-cmd-shift-h = ['join-with left', 'mode main']
ctrl-alt-cmd-shift-j = ['join-with down', 'mode main']
ctrl-alt-cmd-shift-k = ['join-with up', 'mode main']
ctrl-alt-cmd-shift-l = ['join-with right', 'mode main']

down = 'volume down'
up = 'volume up'
shift-down = ['volume set 0', 'mode main']

# Arrange Apps
[[on-window-detected]]
if.app-id = 'com.apple.FaceTime'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.ScreenSharing'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.macpaw.CleanMyMac5'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = ['move-node-to-workspace X', 'layout accordion horizontal', 'exec-and-forget sketchybar --trigger aerospace_workspace_change AEROSPACE_WORKSPACES=X']

[[on-window-detected]]
if.app-id = 'net.whatsapp.WhatsApp'
run = ['move-node-to-workspace C', 'exec-and-forget sketchybar --trigger aerospace_workspace_change AEROSPACE_WORKSPACES=C']

[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'
run = ['move-node-to-workspace C', 'exec-and-forget sketchybar --trigger aerospace_workspace_change AEROSPACE_WORKSPACES=C']

[[on-window-detected]]
if.app-id = 'org.whispersystems.signal-desktop'
run = ['move-node-to-workspace C', 'exec-and-forget sketchybar --trigger aerospace_workspace_change AEROSPACE_WORKSPACES=C']

[[on-window-detected]]
if.app-id = 'im.riot.app'
run = ['move-node-to-workspace C', 'exec-and-forget sketchybar --trigger aerospace_workspace_change AEROSPACE_WORKSPACES=C']

[[on-window-detected]]
if.app-id = 'com.reederapp.5.macOS'
run = ['move-node-to-workspace M', 'exec-and-forget sketchybar --trigger aerospace_workspace_change AEROSPACE_WORKSPACES=M']

[[on-window-detected]]
if.app-id = 'com.apple.Music'
run = ['move-node-to-workspace M', 'exec-and-forget sketchybar --trigger aerospace_workspace_change AEROSPACE_WORKSPACES=M']

[[on-window-detected]]
if.app-id = 'md.obsidian'
run = ['move-node-to-workspace N', 'exec-and-forget sketchybar --trigger aerospace_workspace_change AEROSPACE_WORKSPACES=N']

[[on-window-detected]]
if.app-id = 'notion.id'
run = ['move-node-to-workspace N', 'exec-and-forget sketchybar --trigger aerospace_workspace_change AEROSPACE_WORKSPACES=N']
